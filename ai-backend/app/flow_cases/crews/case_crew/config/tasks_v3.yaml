phase4_ruling_per_issue_task:
  description: |
    Read the document text and for each Issue, identify the Ruling (court's disposition).

    CRITICAL: Extract information ONLY from the provided case text. Do not use general knowledge or external information.

    RULING INSTRUCTIONS:
    {RULING_INSTRUCTIONS}

    RULING EXAMPLES (illustrative, may be partial). Note that ruling examples contain example issues that are paired with the ruling. 
    {RULING_EXAMPLES_JSON}

    Guidance:
    - The ISSUES_JSON above contains existing Issue nodes with their temp_id values.
    - IMPORTANT: The examples below show full issue objects for context only. Your output should only reference issues by their temp_id, not reproduce the full issue object.
    - For each issue, identify the Ruling (court's disposition/decision on that issue) from the case text.
    - A single ruling may apply to multiple issues if they share the same disposition.
    - For each issue's ruling, identify which party the ruling favored (in_favor: plaintiff|defendant|appellant|appellee|petitioner|respondent).
    - Return JSON as: { "rulings": [ { "issue_temp_id": string, "ruling": {...properties...}, "in_favor": string }, ... ] }.
    - Use the temp_id from the provided ISSUES_JSON for "issue_temp_id" - do not generate new temp_ids.
    - The "ruling" object should match Ruling schema properties exactly.
    - Enforce types, enums, and date formats exactly as specified.
    - The "in_favor" field is separate from the ruling properties, keep it separate in the JSON object.
    - Extract from case text only; do not invent information.

    RULING SCHEMA:
    {RULING_SPEC_TEXT}

    CASE_TEXT:
    {CASE_TEXT}

    ISSUES_JSON:
    {ISSUES_JSON}

  expected_output: "A JSON object { rulings: [ { issue_temp_id: string, ruling: {...}, in_favor: string }, ... ] }"

phase5_arguments_per_ruling_task:
  description: |
    For each Ruling, extract ALL Arguments evaluated in that ruling.

    CRITICAL: Extract information ONLY from the provided case text. Do not use general legal knowledge.

    IMPORTANT: The RULING_EXAMPLES_JSON below shows full ruling objects paired with their arguments for context only. Your output should only reference rulings by their temp_id from RULINGS_JSON, not reproduce the full ruling object.

    ARGUMENT INSTRUCTIONS:
    {ARGUMENT_INSTRUCTIONS}

    RULING_EXAMPLES_JSON (illustrative, showing arguments paired with rulings for context):
    {ARGUMENT_EXAMPLES_JSON}

    Guidance:
    - For each argument, indicate:
      * properties: all Argument schema properties (text, raised_by, label, etc.)
      * status: whether it was "Accepted" or "Rejected" by the ruling
    - Note: The 'status' field is NOT a property of the Argument node itself. Keep it separate in the JSON object.
    - Return JSON as: { "results": [ { "ruling_temp_id": string, "arguments": [ { properties: <Argument properties>, status: "Accepted"|"Rejected" }, ... ] } ] }.
    - Extract from case text only; do not invent arguments.

    ARGUMENT SCHEMA:
    {ARGUMENT_SPEC_TEXT}

    CASE_TEXT:
    {CASE_TEXT}

    RULINGS_JSON:
    {RULINGS_JSON}
  expected_output: "A JSON object { results: [ { ruling_temp_id: string, arguments: [{ properties: {...}, status: string }, ...] } ] }"

