phase1_extract_task:
  description: |
    Read the document and extract only case-unique nodes per instructions.

    Required tools (in any order):
    - read_document_tool(file_path="{FILEPATH}", filename="{FILENAME}")

    Steps:
    1) Call read_document_tool and confirm ok:true.
    2) Follow PHASE 1 instructions (allowed labels only, nodes only; include a Case node).
    3) Populate CaseGraph fields with nodes only (edges empty).

    Constraints:
    - temp_id values must be unique within this payload (e.g., n1, n2, …).
    - Keep properties flat and prefer values actually present in the text.
    - Be conservative; avoid inventing facts not supported by the text.

    PHASE 1 instructions:
    You MUST output at least one node for EACH label present in the schema below.
    You MUST include a 'Case' node.
    Do not output any relationships in this phase.
    Do not include any ai_ignore properties.

    SCHEMA SPEC:
    {SCHEMA_SPEC_TEXT}
  expected_output: "A CaseGraph with nodes for case-unique labels and no edges."

phase2_extract_task:
  description: |
    Read the document and create non-unique but creatable nodes comprehensively.

    Required tools (in any order):
    - read_document_tool(file_path="{FILEPATH}", filename="{FILENAME}")

    Steps:
    1) Call read_document_tool and confirm ok:true.
    2) Consider the already generated nodes and the relationship requirements provided below.
    3) Generate all required non-case-unique, creatable nodes so that for every generated node, if the schema has a relationship to a non-case-unique label, at least one such target node is generated (more if appropriate).
    4) Populate CaseGraph fields with nodes only (edges empty).

    Constraints:
    - temp_id values must be unique within this payload (e.g., n1, n2, …).
    - Keep properties flat and prefer values actually present in the text.
    - Be conservative; avoid inventing facts not supported by the text.
    
    PHASE 2 instructions:
    You MUST output nodes for labels present in the schema below, if evidence exists in the text.
    Do not output any relationships in this phase.
    Do not include any ai_ignore properties.

    SCHEMA SPEC (only non-case-unique, creatable labels):
    {SCHEMA_SPEC_TEXT}

    ALREADY_GENERATED_NODES:
    {GENERATED_NODES_JSON}

    RELATIONSHIP_REQUIREMENTS:
    {REL_REQUIREMENTS_JSON}
  expected_output: "A CaseGraph with nodes for non-unique creatable labels and no edges."

phase2b_dedup_task:
  description: |
    Deduplicate candidate nodes against provided existing catalogs.

    Inputs will be provided in the instructions as JSON blocks:
    - CANDIDATE_NODES_JSON: { "nodes": [ {temp_id, label, properties}, ... ] }
    - CATALOGS: { label: [ { name?, description?, text?, citation? }, ... ] }

    Steps:
    1) Compare each candidate to the relevant label catalog.
       - Use 'name' when the label has a name property.
       - Otherwise use 'description' if present; otherwise 'text'.
       - For 'law' label, 'citation' may be present for additional matching context.
    2) If there is a likely match, standardize candidate to the exact catalog name.
    3) Return JSON as { "nodes": [ ...updated candidates... ] }.

    Constraints:
    - Do not remove nodes. Only standardize names when confident; otherwise leave as-is.

    CANDIDATE_NODES_JSON:
    {CANDIDATE_NODES_JSON}

    CATALOGS:
    {CATALOGS_JSON}
  expected_output: "A JSON object { nodes: [...] } with standardized node names."

phase3_relationships_task:
  description: |
    Assign relationships between nodes following the provided schema mappings strictly.

    Inputs will be provided as JSON blocks:
    - SCHEMA_SPEC: text with mapping lines (Label and Relationships)
    - NODES_JSON: { "nodes": [ {temp_id, label, properties}, ... ] }

    Steps:
    1) For each source node, consult allowed relationships for its label.
    2) Create edges to target nodes whose labels match the allowed target.
    3) Cap to a small number per relation per source to avoid explosion.
    4) Return JSON as { "edges": [ {from, to, label, properties}, ... ] }.

    Constraints:
    - 'from' and 'to' must be existing temp_id values.
    - Only use relationship labels allowed by the schema mapping.

    SCHEMA SPEC:
    {SCHEMA_SPEC_TEXT}

    NODES_JSON:
    {NODES_JSON}
  expected_output: "A JSON object { edges: [...] } with valid edges."

phase4_select_existing_task:
  description: |
    Select existing (non-creatable) nodes for the case from provided catalogs.

    Inputs will be provided in the instructions as JSON blocks:
    - CASE_TEXT: raw case text
    - CATALOGS: { label: [ { name?, description?, text?, citation? }, ... ] }
    - RELATIONSHIP_REQUIREMENTS: { "requirements": [ {from, label, to}, ... ] }

    Steps:
    1) Use the case text to decide which existing entities apply for each label. Ensure that for each requirement that targets a non-creatable label, at least one catalog entry for that target label is selected when relevant to the case.
    2) Return JSON as { "selected": { label: [values...] } } where each value is:
       - 'name' when the label has a name property;
       - otherwise 'description' if present; otherwise 'text'.

    Constraints:
    - Only return names present in the catalogs.

    CASE_TEXT:
    {CASE_TEXT}

    CATALOGS:
    {CATALOGS_JSON}

    RELATIONSHIP_REQUIREMENTS:
    {REL_REQUIREMENTS_JSON}
  expected_output: "A JSON object { selected: { label: [names...] } }."


phase5_select_existing_task:
  description: |
    Phase 5 selection for ReliefType and Forum from provided catalogs using Ruling properties and case text. Do not select Jurisdiction; it will be added programmatically from the selected Forum.

    Inputs will be provided in the instructions as JSON blocks:
    - RULING_JSON: { ...properties... } (the single generated Ruling node's properties)
    - CASE_TEXT: raw case text
    - CATALOGS: { label: [ { name?, type?, description?, text? }, ... ] }

    Steps:
    1) Based on RULING_JSON, select the most appropriate ReliefType from the ReliefType catalog.
    2) Based on CASE_TEXT, select the most appropriate Forum from the Forum catalog.
    3) Return JSON as { "selected": { "ReliefType": [values...], "Forum": [values...] } } where each value is:
       - 'name' when the label has a name property;
       - 'type' when ReliefType uses a type property;
       - otherwise 'description' if present; otherwise 'text'.

    Constraints:
    - Only return names present in the catalogs.
    - Do not invent new values.

    RULING_JSON:
    {RULING_JSON}

    CASE_TEXT:
    {CASE_TEXT}

    CATALOGS:
    {CATALOGS_JSON}
  expected_output: "A JSON object { selected: { ReliefType: [...], Forum: [...] } }."


phase6_law_task:
  description: |
    Phase 6: For each provided Argument, select or create at least one Law.

    Inputs provided in instructions as JSON blocks:
    - ARGUMENTS_JSON: { "arguments": [ { temp_id, properties }, ... ] }
    - CATALOGS: { "Law": [ { name, text, type, citation }, ... ] }
    - SCHEMA_SPEC: schema for Law properties for validation context

    Steps:
    1) For each argument, decide the governing Law(s). Prefer matching entries in the Law catalog by citation or name.
    2) When no clear match exists, propose a new Law consistent with schema.
    3) Return JSON as {
       "laws": [ { properties }, ... ],
       "argument_to_law": [ { "argument_temp_id": "nX", "law_index": <index in laws array> }, ... ]
    }

    Constraints:
    - Do not output duplicate Law entries; deduplicate by citation/name.
    - Properties must comply with schema types and required fields.

    ARGUMENTS_JSON:
    {ARGUMENTS_JSON}

    CATALOGS:
    {CATALOGS_JSON}

    SCHEMA_SPEC:
    {SCHEMA_SPEC_TEXT}
  expected_output: "A JSON object { laws: [...], argument_to_law: [...] }."


phase7_issue_related_task:
  description: |
    Phase 7: For each Issue, select or create one Doctrine, one Policy, and one FactPattern.

    Inputs provided in instructions as JSON blocks:
    - ISSUES_JSON: { "issues": [ { temp_id, properties }, ... ] }
    - CATALOGS: {
        "Doctrine": [ { name, description, category }, ... ],
        "Policy": [ { name, description, discipline }, ... ],
        "FactPattern": [ { name, description }, ... ]
      }
    - SCHEMA_SPEC: schema snippets for Doctrine, Policy, FactPattern properties

    Steps:
    1) For each issue, decide one Doctrine, one Policy, and one FactPattern.
       Prefer catalog matches by name/description; otherwise propose new entries consistent with schema.
    2) Return JSON as {
       "doctrines": [ { properties }, ... ],
       "policies": [ { properties }, ... ],
       "factpatterns": [ { properties }, ... ],
       "issue_map": [ { "issue_temp_id": "nX", "doctrine_index": i, "policy_index": j, "factpattern_index": k } ]
    }

    Constraints:
    - Deduplicate outputs by name (and category/discipline where applicable).
    - Properties must comply with schema types and required fields.

    ISSUES_JSON:
    {ISSUES_JSON}

    CATALOGS:
    {CATALOGS_JSON}

    SCHEMA_SPEC:
    {SCHEMA_SPEC_TEXT}
  expected_output: "A JSON object { doctrines: [...], policies: [...], factpatterns: [...], issue_map: [...] }."


phase8_party_task:
  description: |
    Phase 8: Identify Parties from case text and deduplicate against existing Party catalog; output roles for Case relationships.

    Inputs provided in instructions as JSON blocks:
    - CASE_TEXT: raw case text
    - CATALOGS: { "Party": [ { name, type }, ... ] }

    Steps:
    1) Extract all parties involved in the case with best-guess role and type.
    2) For each extracted party name, fuzzy match against the Party catalog; if match is strong, standardize to catalog name.
    3) Return JSON as {
       "parties": [ { name, type }, ... ],
        "case_roles": [ { "party_index": <index in parties array>, "role": "plaintiff|defendant|appellant|appellee|petitioner|respondent" } ]
    }

    Constraints:
    - Only standardize to catalog entries; do not invent catalog names.
    - Prefer high-precision matches; if uncertain, keep extracted name.

    CASE_TEXT:
    {CASE_TEXT}

    CATALOGS:
    {CATALOGS_JSON}
  expected_output: "A JSON object { parties: [...], case_roles: [...] }."



