phase2_select_forum_task:
  description: |
    Phase 2: Select a matching Forum from the provided catalog based on the case text, if any.

    CRITICAL: Base your selection ONLY on the provided CASE_TEXT. Do not use general knowledge or external information. Select only what is explicitly or implicitly supported by the text.

    INSTRUCTIONS:
    {FORUM_INSTRUCTIONS}

    FORUM EXAMPLES:
    {FORUM_EXAMPLES_JSON}

    Inputs will be provided in the instructions as JSON blocks:
    - CASE_TEXT: raw case text
    - CATALOGS: { "Forum": [ { forum_id, name, description?, ...other fields... }, ... ] }

    Steps:
    1) Based on CASE_TEXT, identify which Forum (court/tribunal) heard this case, if any.
    2) Select a matching Forum from the Forum catalog. If no matching Forum is found.
    3) Return JSON as { "selected": { "Forum": [forum_id] } } where forum_id is from the catalog. If no matching Forum is found, return If no match found: [forum_id] is an empty array (e.g., []).

    Constraints (STRICTLY ENFORCED):
    - YOU MUST ONLY RETURN a forum_id VALUE THAT EXISTS IN THE PROVIDED CATALOG.
    - DO NOT create, invent, or return any other values.
    - Return ONLY the ID field values as they appear in the catalog entries.
    - If no matching Forum is found, return an empty array [] for the Forum key.
    - NEVER use general knowledge - ONLY select from the catalog IDs provided below.

    CASE_TEXT:
    {CASE_TEXT}

    CATALOGS:
    {CATALOGS_JSON}
  expected_output: "A JSON object { selected: { Forum: [forum_id] } } where forum_id is from the catalog."

phase3_relationships_task:
  description: |
    Assign relationships between nodes following the provided schema mappings strictly.

    Inputs will be provided as JSON blocks:
    - SCHEMA_SPEC: text with mapping lines (Label and Relationships)
    - NODES_JSON: { "nodes": [ {temp_id, label, properties}, ... ] }

    Steps:
    1) For each source node, consult allowed relationships for its label.
    2) Create edges to target nodes whose labels match the allowed target.
    3) Cap to a small number per relation per source to avoid explosion.
    4) Return JSON as { "edges": [ {from, to, label, properties}, ... ] }.

    Constraints:
    - 'from' and 'to' must be existing temp_id values.
    - Only use relationship labels allowed by the schema mapping.

    SCHEMA SPEC:
    {SCHEMA_SPEC_TEXT}

    NODES_JSON:
    {NODES_JSON}
  expected_output: "A JSON object { edges: [...] } with valid edges."

phase4_ruling_per_issue_task:
  description: |
    Phase 4: Read the document text and for each Issue, identify the Ruling (court's disposition).

    CRITICAL: Extract information ONLY from the provided case text. Do not use general knowledge or external information.

    CASE_TEXT:
    {CASE_TEXT}

    ISSUES_JSON:
    {ISSUES_JSON}

    Guidance:
    - For each issue, identify the Ruling (court's disposition/decision on that issue).
    - A single ruling may apply to multiple issues if they share the same disposition.
    - For each issue's ruling, identify which party the ruling favored (in_favor: plaintiff|defendant|appellant|appellee|petitioner|respondent).
    - Return JSON as: { "rulings": [ { "issue_temp_id": string, "ruling": <Ruling properties>, "in_favor": string }, ... ] }.
    - Match Ruling schema properties exactly (label, type, text, ratio, summary).
    - Extract from case text only; do not invent information.

    RULING INSTRUCTIONS:
    {RULING_INSTRUCTIONS}

    RULING EXAMPLES:
    {RULING_EXAMPLES_JSON}

    RULING SCHEMA:
    {RULING_SPEC_TEXT}
  expected_output: "A JSON object { rulings: [ { issue_temp_id: string, ruling: {...}, in_favor: string }, ... ] }"

phase5_arguments_and_laws_task:
  description: |
    Phase 5: For each Ruling, extract ALL Arguments evaluated in that ruling and select the Laws the ruling relies upon.

    CRITICAL: Extract information ONLY from the provided case text. Do not use general legal knowledge.

    CASE_TEXT:
    {CASE_TEXT}

    RULINGS_JSON:
    {RULINGS_JSON}

    Guidance:
    - For each ruling, extract ALL principal arguments advanced by any party that were evaluated in that ruling.
    - For each argument, indicate:
      * properties: all Argument schema properties (text, raised_by)
      * status: whether it was "Supported" or "Rejected" by the ruling
    - For each ruling, select the Law(s) from the catalog that the ruling explicitly relies upon or cites.
    - Return JSON as: { "results": [ { "ruling_temp_id": string, "arguments": [ { properties: <Argument properties>, status: "Supported"|"Rejected" }, ... ], "law_ids": [law_id1, law_id2, ...] } ] }.
    - For law_ids, ONLY use law_id values that exist in the provided catalog. If no laws are referenced, return empty array [].
    - Extract from case text only; do not invent arguments or laws.

    ARGUMENT INSTRUCTIONS:
    {ARGUMENT_INSTRUCTIONS}

    ARGUMENT EXAMPLES:
    {ARGUMENT_EXAMPLES_JSON}

    ARGUMENT SCHEMA:
    {ARGUMENT_SPEC_TEXT}

    LAW SCHEMA:
    {LAW_SPEC_TEXT}

    LAW CATALOG (select law_ids from here):
    {CATALOGS_JSON}
  expected_output: "A JSON object { results: [ { ruling_temp_id: string, arguments: [{ properties: {...}, status: string }, ...], law_ids: [...] } ] }"


phase6_argument_concepts_task:
  description: |
    Phase 6: For each Argument, select the Doctrine(s), Policy(ies), and FactPattern(s) that relate to that argument.

    CRITICAL: Base your selection ONLY on the argument properties extracted from the case text. Only select concepts that are explicitly or implicitly referenced in the argument text. Do not use general legal knowledge.

    ARGUMENTS_JSON:
    {ARGUMENTS_JSON}

    CATALOGS (select IDs from these):
    {CATALOGS_JSON}

    Guidance:
    - For each argument, identify which Doctrine(s), Policy(ies), and/or FactPattern(s) from the catalogs relate to that argument.
    - It's OK if an argument doesn't relate to any doctrine, policy, or fact pattern - in that case, use empty arrays [].
    - Only select concepts that are referenced in or relevant to the argument text itself.
    - Return JSON as: { "argument_map": [ { "argument_temp_id": string, "doctrine_ids": [doctrine_id1, ...], "policy_ids": [policy_id1, ...], "factpattern_ids": [factpattern_id1, ...] }, ... ] }.

    Constraints (STRICTLY ENFORCED):
    - YOU MUST ONLY RETURN IDs THAT EXIST IN THE PROVIDED CATALOGS
    - DO NOT create, invent, or return any other values
    - Return ONLY the ID field values as they appear in the catalog entries
    - If no appropriate match exists in a catalog, use an empty array [] for that concept type
    - NEVER use general legal knowledge - ONLY select from the catalog IDs provided

    DOCTRINE INSTRUCTIONS:
    {DOCTRINE_INSTRUCTIONS}

    DOCTRINE EXAMPLES:
    {DOCTRINE_EXAMPLES_JSON}

    POLICY INSTRUCTIONS:
    {POLICY_INSTRUCTIONS}

    POLICY EXAMPLES:
    {POLICY_EXAMPLES_JSON}

    FACTPATTERN INSTRUCTIONS:
    {FACTPATTERN_INSTRUCTIONS}

    FACTPATTERN EXAMPLES:
    {FACTPATTERN_EXAMPLES_JSON}

    SCHEMA_SPEC:
    {SCHEMA_SPEC_TEXT}
  expected_output: "A JSON object { argument_map: [ { argument_temp_id: string, doctrine_ids: [...], policy_ids: [...], factpattern_ids: [...] }, ... ] }"


phase7_relief_and_type_task:
  description: |
    Phase 7: For each Ruling, extract the Relief (remedy/outcome awarded) and select its ReliefType from the catalog.

    CRITICAL: Extract information ONLY from the provided case text. Do not use general knowledge or external information.

    CASE_TEXT:
    {CASE_TEXT}

    RULINGS_JSON:
    {RULINGS_JSON}

    Guidance:
    - For each ruling, identify the Relief (specific remedy/outcome/order granted by the court).
    - Extract Relief properties (description of what was granted/denied).
    - Determine the relief_status: "granted", "denied", or "partially granted".
    - Select the most appropriate ReliefType from the catalog that categorizes this relief.
    - Return JSON as: { "results": [ { "ruling_temp_id": string, "relief": <Relief properties>, "relief_status": "granted"|"denied"|"partially granted", "relief_type_id": string }, ... ] }.
    - If no relief was specified for a ruling, you may omit that ruling from results.

    Constraints (STRICTLY ENFORCED):
    - For relief_type_id, YOU MUST ONLY RETURN values THAT EXIST IN THE PROVIDED CATALOG
    - DO NOT create, invent, or return any other relief_type_id values
    - Return ONLY the relief_type_id field values as they appear in the catalog entries
    - Extract from case text only; do not invent relief information

    RELIEF INSTRUCTIONS:
    {RELIEF_INSTRUCTIONS}

    RELIEF EXAMPLES:
    {RELIEF_EXAMPLES_JSON}

    RELIEF SCHEMA:
    {RELIEF_SPEC_TEXT}

    RELIEFTYPE INSTRUCTIONS:
    {RELIEFTYPE_INSTRUCTIONS}

    RELIEFTYPE EXAMPLES:
    {RELIEFTYPE_EXAMPLES_JSON}

    RELIEFTYPE CATALOG (select relief_type_id from here):
    {CATALOGS_JSON}
  expected_output: "A JSON object { results: [ { ruling_temp_id: string, relief: {...}, relief_status: string, relief_type_id: string }, ... ] }"


phase8_party_task:
  description: |
    Phase 8: Identify Parties from case text and deduplicate against existing Party catalog; output roles for Case relationships.

    CRITICAL: Extract parties ONLY from the provided CASE_TEXT. Do not use general knowledge or external information. Only include parties that are explicitly mentioned in the case text with their roles as stated in the text.

    INSTRUCTIONS:
    {PARTY_INSTRUCTIONS}

    PARTY EXAMPLES:
    {PARTY_EXAMPLES_JSON}

    Inputs provided in instructions as JSON blocks:
    - CASE_TEXT: raw case text
    - CATALOGS: { "Party": [ { name, type }, ... ] }

    Steps:
    1) Extract all parties involved in the case with best-guess role and type based on the case text only.
    2) For each extracted party name, fuzzy match against the Party catalog; if match is strong, standardize to catalog name.
    3) Return JSON as {
       "parties": [ { name, type }, ... ],
        "case_roles": [ { "party_index": <index in parties array>, "role": "plaintiff|defendant|appellant|appellee|petitioner|respondent" } ]
    }

    Constraints:
    - Only standardize to catalog entries; do not invent catalog names.
    - Prefer high-precision matches; if uncertain, keep extracted name.
    - Extract ONLY parties mentioned in the case text, not from general knowledge.

    CASE_TEXT:
    {CASE_TEXT}

    CATALOGS:
    {CATALOGS_JSON}
  expected_output: "A JSON object { parties: [...], case_roles: [...] }."



