- label: Case
  instructions: | 
    Analyse the document text (provided below) and extract the Case information as described.
    Include the official case name as the name, and use a concise case synopsis for summary.
  examples:
    - name: "Abrams v. United States"
      summary: |
        Defendants were convicted under the Espionage Act for distributing leaflets urging resistance to U.S. war efforts. 
        The Supreme Court affirmed their conviction, emphasizing the wartime context. 
        A notable dissent by Justice Holmes emphasized the importance of free speech under the First Amendment.
    - name: "Smith v. Acme Manufacturing Co."
      summary: |
        Plaintiff brought a products liability claim alleging a design defect in a hydraulic press that caused workplace injury. 
        The appellate court affirmed part of the lower court's judgment but remanded for further proceedings on specific claims. 
        The decision clarified the scope of manufacturer duty in design defect cases.
    - name: "People v. Ortega"
      summary: |
        Defendant appealed a conviction on grounds of unlawful search and seizure. 
        The appellate court found that evidence had been obtained in violation of the Fourth Amendment and reversed the conviction. 
        The ruling reinforced constitutional limits on warrantless searches.
    - name: "Green Earth Alliance v. State Water Board"
      summary: |
        An environmental advocacy group sought review of a discharge permit issued by the state agency. 
        The court set aside the permit, holding that the agency failed to adequately consider cumulative environmental impacts as required by law. 
        The decision underscored agencies' duty to conduct comprehensive environmental review.

- label: Proceeding
  instructions: |
    Identify the primary proceeding that the case is part of.
    Extract the distinct stage of the litigation relevant to the opinion (either district court, appeal court, or supreme court).
    Use the stage, docket number, and dates to summarize what occurred.
    Note that the case may reference other proceedings, but the primary proceeding is the one that the case text is primarily about.
  examples:
    - stage: district court
      docket_no: "19-CV-78231"
      filed_date: "2021-03-08"
      decided_date: "2021-03-15"
    - stage: appeal court
      docket_no: A165432
      filed_date: "2022-01-10"
      decided_date: "2022-11-04"

- label: Issue
  instructions: |
    Create a new Issue node for each legal question decided by the court in neutral terms. 
    Create a concise label for the question and the fuller question in text.
  examples:
    - label: "Single Entity Question"
      text: >
        "Can the 32 independently owned NFL teams,
        when licensing their intellectual property collectively through their joint venture (NFLP),
        be considered a single entity immune from Section 1 of the Sherman Act,
        or are they separate actors capable of conspiring?"
      type: procedural
    - label: "Product Market Definition - Vertical Aspects"
      text: > 
        "What are the relevant product markets (lines of commerce) for analyzing
        the vertical aspects of the Brown-Kinney merger?"
      type: substantive

- label: Forum
  instructions: |
    Select the adjudicative body where the matter was heard (court, agency, board). Use the forum name and type.
  examples:
    - name: "U.S. District Court for the Southern District of New York"
      type: "federal trial court"
    - name: "National Labor Relations Board"
      type: "administrative agency"

- label: Ruling
  instructions: >
    Summarize the court's final disposition (affirmed, reversed, remanded, etc.) in the label field.
    In the reasoning field, describe the specific legal ruling or holding that results in that disposition.
    This is the core legal conclusion that justifies the final outcome (e.g., 'Sufficient evidence
    supported the jury's negligence finding,' or 'Trial court applied an incorrect standard
    for preliminary injunction'). A single ruling may apply to multiple issues/holdings in the case.
  examples:
    - issue: 
        label: "Appealability - Is the District Court's Judgment a 'Final Judgment'?"
        text: >
          Is a District Court judgment that orders divestiture but leaves
          the specific implementation plan to be determined later a "final
          judgment" appealable under the Expediting Act?
      ruling:
        label: "The Judgment Is Final and Appealable"
        type: appeal
        reasoning: >
          The Supreme Court held that the District Court's divestiture order was a final judgment
          because it fully resolved the substantive controversy between the parties.
          Although the decree left certain implementation details to be worked out later,
          those matters were purely ministerial and did not affect the finality of the decision.
          The Court emphasized that postponing appeal until after implementation would
          defeat the purpose of the Expediting Act's direct-review mechanism in antitrust cases.
        ratio: >
          A judgment is final and appealable when it conclusively determines the rights
          of the parties, even if ministerial tasks remain, provided no substantive issues are
          left for further adjudication.
        summary: >
          The Supreme Court held that the District Court's decree was a final judgment
          properly appealable under § 2 of the Expediting Act. The Court found that despite
          leaving implementation details to be worked out, the judgment
          had 'sufficient indicia of finality' because all prayers for relief 
          were decided and the remaining tasks were ministerial.
      in_favor: "appellant"
    - issue:
        label: "Standard of Review - Rule of Reason vs Per Se Illegality"
        text: >
          Given that the NFL's collective licensing constitutes "concerted action,"
          what legal standard should courts use to evaluate its legality—the strict
          "per se" rule (which automatically condemns certain actions) or the more
          flexible "Rule of Reason" (which weighs pro-competitive benefits against
          anti-competitive harms)?
      ruling:
        label: "Rule of Reason Applies"
        type: appeal
        reasoning: >
          The Supreme Court held that the Rule of Reason is the appropriate standard
          for evaluating the NFL's collective licensing arrangements. The Court reasoned
          that per se illegality is inappropriate in this context because the teams
          must cooperate to produce the product of professional football itself.
          Collective activity is therefore not inherently anticompetitive, and its
          legality depends on whether, under the Rule of Reason, the restraint's
          pro-competitive benefits outweigh its anticompetitive effects.
        ratio: >
          When cooperation among competitors is necessary to create a product,
          courts must apply the Rule of Reason rather than per se condemnation to
          determine whether the joint activity unreasonably restrains trade.
        summary: >
          The Court held that the Rule of Reason is the appropriate standard.
          It explicitly stated that per se illegality is inapplicable for this industry
          because some level of cooperation among teams is
          "essential if the product is to be available at all."
      in_favor: "defendant"

- label: Argument
  instructions: |
    For the given Ruling, extract ALL of the principal arguments advanced by any party that were evaluated in that ruling.
    Put the thesis or rationale in text and identify who raised it.
    Create an appropriate name for the argument in the label field.
  examples:
    - ruling:
      label: "Relevant Product Markets Are Men's, Women's, and Children's Shoes"
      type: appeal
      favored_party: appellee
      reasoning: >
        The Supreme Court upheld the District Court's finding that the relevant lines of
        commerce for antitrust purposes are men's, women's, and children's shoes. The Court
        accepted the District Court's application of submarket principles and practical
        indicia, concluding that these lines constitute distinct product markets.
      arguments:
        - label: "Submarket Analysis Framework"
          text: >
            Defendants argued that the District Court erred in defining submarkets and that
            the Clayton Act requires consideration only of broad markets based on
            interchangeability of use and cross-elasticity of demand. They maintained that
            men's, women's, and children's shoes were not separate markets but part of a
            single national footwear market.
          raised_by: defendant
          status: Accepted
          disposition_text: >
            "The boundaries of such a submarket may be determined by examining such practical
            indicia as industry or public recognition of the submarket as a separate economic entity,
            the product's peculiar characteristics and uses, unique production facilities, distinct
            customers, distinct prices, sensitivity to price changes, and specialized vendors...
            It is necessary to examine the effects of a merger in each such economically significant
            submarket to determine if there is a reasonable probability that the merger will substantially
            lessen competition."
        - label: "Practical Indicia Test"
          text: >
            Defendants contended that the District Court's reliance on “practical indicia”
            such as public perception and marketing channels was subjective and improperly
            substituted judicial intuition for economic proof.
          raised_by: defendant
          status: Accepted
          disposition_text: >
            "Determination of the relevant market is a matter of judgment and depends upon
            the facts peculiar to the case... Boundaries of such a submarket may be determined
            by examining such practical indicia as industry or public recognition of the submarket
            as a separate economic entity, the product's peculiar characteristics and uses, distinct
            customers, distinct prices, and specialized vendors."
        - label: "Application of Practical Indicia to Shoe Lines"
          text: >
            Defendants argued that even if submarkets exist, the District Court erred in
            finding separate markets for men's, women's, and children's shoes, insisting that
            these lines directly compete and are interchangeable in production and sale.
          raised_by: defendant
          status: Accepted
          disposition_text: >
            "Applying these considerations to the present case, we conclude that the record supports
            the District Court's finding that the relevant lines of commerce are men's, women's, and
            children's shoes. These product lines are recognized by the public; each line is manufactured
            in separate plants; each has characteristics peculiar to itself rendering it generally
            noncompetitive with the others; and each is, of course, directed toward a distinct class
            of customers."
        - label: "Price-Quality Divisions Within Product Lines"
          text: >
            Defendants argued that their medium-priced shoes occupied a market distinct from
            the low-priced shoes sold by competitors such as Kinney, claiming that the merger
            should not be condemned based on competition between products of differing quality
            and consumer segments.
          raised_by: defendant
          status: Rejected
          disposition_text: >
            "Appellant... contends that the District Court's definitions fail to recognize sufficiently
            'price/quality' and 'age/sex' distinctions... Brown argues that the predominantly medium-priced
            shoes which it manufactures occupy a product market different from the predominantly low-priced
            shoes which Kinney sells. But agreement with that argument would be equivalent to holding that
            medium-priced shoes do not compete with low-priced shoes. We think the District Court properly
            found the facts to be otherwise... Thus we agree with the District Court that in this case a
            further division of product lines based on 'price/quality' differences would be 'unrealistic.'"
    - ruling:
      label: "The Horizontal Merger Violates Section 7"
      type: appeal
      favored_party: appellee
      reasoning: >
        The Supreme Court concluded that the merger between Brown and Kinney would substantially
        lessen competition in the shoe industry. The Court cited the firms' combined market shares,
        their impact on independent retailers, and the industry's accelerating trend toward concentration.
      arguments:
        - label: "Rejection of Purely Mathematical Test"
          text: >
            Defendants argued that the Court should apply a quantitative threshold, asserting
            that the combined market shares were too low to prove a substantial lessening of
            competition. They urged a mechanical percentage rule rather than a structural
            evaluation of market effects.
          raised_by: defendant
          status: Accepted
          disposition_text: >
            "We explicitly reject a purely mathematical test for determining whether a merger may
            substantially lessen competition... The statute requires not arithmetic but appraisal
            of the market structure, history, and probable future... Congress intended to arrest
            anticompetitive tendencies in their incipiency, not merely to condemn them after
            fruition."
        - label: "Combined Market Shares in Specific Cities"
          text: >
            Defendants contended that local market evidence was insufficient and that the Court
            should consider competition at the national level rather than relying on city-by-city
            analysis of retail shares.
          raised_by: defendant
          status: Accepted
          disposition_text: >
            "The record demonstrates that in numerous cities of 10,000 population or more, the
            combined market share of Brown and Kinney was substantial... Such figures, considered
            in light of the structure and trend of the industry, support the District Court's
            finding that the merger would substantially lessen competition."
        - label: "Impact on Independent Retailers"
          text: >
            Plaintiffs argued that the merger would harm small, independent retailers by expanding
            Brown and Kinney's control over distribution channels and by increasing concentration
            at the expense of local competition.
          raised_by: plaintiff
          status: Accepted
          disposition_text: >
            "The Court properly took into account the probable adverse effects of the merger upon
            small independent retailers... The elimination or weakening of these competitors is
            precisely the type of economic concentration Section 7 was designed to prevent."
        - label: "Trend Toward Concentration"
          text: >
            Plaintiffs argued that the merger must be evaluated within the broader trend of
            increasing concentration and vertical integration in the shoe industry, warning that
            the transaction would accelerate that anticompetitive trajectory.
          raised_by: plaintiff
          status: Accepted
          disposition_text: >
            "The existence of a trend toward vertical integration, which the District Court found,
            is well substantiated by the record... It is against this background of continuing
            concentration that the present merger must be viewed... Remaining vigor cannot immunize
            a merger if the trend in that industry is toward oligopoly... It is the probable effect
            of the merger upon the future as well as the present which the Clayton Act commands the
            courts... to examine."
        - label: "Market Share Percentages Too Small to Matter"
          text: >
            Defendants argued that their post-merger market shares were too small to threaten
            competition and that Section 7 should not apply to firms with modest combined percentages.
          raised_by: defendant
          status: Rejected
          disposition_text: >
            "We cannot accept the contention that the percentages here involved are too small
            to warrant relief... The Act is concerned with probabilities, not certainties,
            and forbids mergers whose effect may be substantially to lessen competition...
            The figures, viewed in context, reveal a significant competitive threat."

- label: Law
  instructions:
  examples:
    - name: "U.C.C. § 2-314—Implied Warranty of Merchantability"
      text: |
        Goods must be fit for the ordinary purposes for which such goods are used.
      type: statute
      citation: "U.C.C. § 2-314"
    - name: "Cal. Civ. Proc. Code § 425.16—Anti-SLAPP"
      text: |
        Allows early dismissal of suits arising from protected speech on public issues.
      type: statute
      citation: "Cal. Civ. Proc. Code § 425.16"

- label: Party
  instructions: |
    Identify and extract all parties involved in the case. Use the entity's official name and the entity type.
    
    CRITICAL TYPE CONSTRAINT: When assigning party types, you MUST use ONLY these exact five values:
    - individual (for natural persons)
    - corporation (for incorporated business entities, companies, LLCs)
    - organization (for non-profit organizations, unincorporated associations, educational institutions, unions, trade associations)
    - government (for government entities, agencies, departments, municipalities at any level - federal, state, local)
    - group (for informal groups, collectives, or multiple unnamed parties)
    
    DO NOT use any other type labels such as "unincorporated association", "educational institution", 
    "government entity", "business", "LLC", "agency", "municipality", "union", etc. 
    You MUST map every party to one of the five enumerated values above.
    
    Mapping examples:
    - "Harvard University" → organization (not "educational institution")
    - "Teamsters Local 507" → organization (not "union" or "unincorporated association")
    - "U.S. Department of Justice" → government (not "government entity" or "agency")
    - "Acme LLC" → corporation (not "LLC" or "business")
    
    CRITICAL ROLE CONSTRAINT: When assigning party roles in case_roles, you MUST use ONLY these exact values:
    - plaintiff
    - defendant
    - appellant
    - appellee
    - petitioner
    - respondent
    
    DO NOT use any other role labels (e.g., "amicus", "intervenor", "third-party", "amicus curiae", etc.).
    If a party has a non-standard role (like amicus curiae), you must map them to the closest standard role if they are a primary party
    
    Only include parties that have one of the six enumerated roles above.
  examples:
    - name: "Omega BioTech, Inc."
      type: corporation
    - name: "Alicia Ramirez"
      type: individual
    - name: "Sierra Club"
      type: organization
    - name: "City of Boston"
      type: government
    - name: "Unnamed protestors"
      type: group

- label: Doctrine
  instructions: |
    A legal doctrine is an established principle, test, or rule of law that a court applies to decide an issue (e.g., 'Business Judgment Rule,' 'Daubert Standard,' 'Respondeat Superior'). This is the legal tool the court uses for its analysis.
    Use the doctrine name and give a short, jurisdiction-neutral description. Do NOT create generic “standards” doctrines (e.g., “legal sufficiency of the evidence,” “burden of proof,” “credibility,” “elements of a claim”) unless the opinion explicitly names and applies a specific test/standard (e.g., “Daubert,” “Business Judgment Rule,” “summary judgment standard,” “Rule 50/JMOL standard”).
  examples:
    - name: Acquiring-Acquired Mergers
      description: >
        By the deletion of the "acquiring-acquired" language in the original text,
        Congress hoped to make plain that section 7 applied not only to mergers between
        actual competitors, but also to vertical and conglomerate mergers whose effect
        may tend to lessen competition in any line of commerce in any section of the country.
    - name: The Copperweld Framework
      description: >
        The Court repeatedly invoked Copperweld Corp. v. Independence Tube Corp. for the principle
        that § 1 embodies a "basic distinction between concerted and independent action."
        The Court explained that Congress "treated concerted behavior more strictly than unilateral behavior"
        because "concerted activity inherently is fraught with anticompetitive risk."

- label: Policy
  instructions: |
    A legal policy is the underlying justifications or social/economic goals the court cites to support its reasoning, distinct from the black-letter legal rule (doctrine) itself (e.g., 'promoting finality of judgments,' 'deterring corporate misconduct,' 'protecting consumers').
    Capture explicit policy considerations the court invokes. 
    Use a concise name and short description.
  examples:
    - name: "Prevention of Cartel Evasion"
      description: >
        The Court warned that if profit-sharing alone immunized joint ventures,
        "any cartel 'could evade the antitrust laws simply by creating a joint venture"
        to serve as the exclusive seller of their competing products.'
        citing Judge Sotomayor's concurrence in MLB Properties).
    - name: "Prevention of Concentration"
      description: >
        The Court emphasized that the 1950 amendment to Section 7 was designed to reach mergers "in their incipiency."
        "[I]t is apparent that a keystone in the erection of a barrier to what Congress saw was the rising tide of economic concentration,
        was its provision of authority for arresting mergers at a time when the trend to a lessening of competition in a line of commerce was still in its incipiency.
        Congress saw the process of concentration in American business as a dynamic force; it sought to assure the Federal Trade Commission and the courts the power to brake this force at its outset and before it gathered momentum."

- label: FactPattern
  instructions: |
    A fact pattern is a recurring, generalized category of real-world events or situations that gives rise to the legal issue. Focus on the type of interaction, stripping away specific party names and dates (e.g., 'Employee termination after whistleblowing,' 'Online contract formation via clickwrap,' 'Traffic stop based on anonymous tip').
    Abstract the recurring scenario that the issue relates to. 
    Use a succinct name and a short description.
  examples:
    - name: "Medical Device Off-Label Promotion"
      description: "Manufacturer communications to physicians about unapproved uses."
    - name: "Gig-Worker Misclassification"
      description: "Platform control over workers resembles employment relationship."

- label: Relief
  instructions: |
    Extract the relief awarded or sought as defined by the schema. Use the standardized type and a short description.
  examples:
    - description: "Order restraining competitor from using misappropriated trade secrets."
    - description: "Declaration that insurer owes no duty to defend under the policy."

- label: ReliefType
  instructions: |
    Select the type(s) of relief awarded or sought as defined by the schema. Use the standardized type.
  examples:
    - type: injunction
    - type: declaratory

- label: Jurisdiction
  instructions: |
    Choose the relevant jurisdiction entity. Use the official jurisdiction name.
  examples:
    - name: "U.S. Supreme Court"
    - name: "California Court of Appeal, First District"
