phase7_argument_concepts_task:
  description: |
    You have access to an argument json object that has been created from the case text.

    ARGUMENTS_JSON:
    {ARGUMENTS_JSON}

    You also have access to a catalog of Doctrine, Policy, and FactPattern concepts.

    CATALOGS (prefer selecting IDs from these):
    {CATALOGS_JSON}

    Instructions:
    - For each Argument in the json, select or create the relevant Doctrine(s), Policy(ies), and FactPattern(s) that relate to that argument. 
    - CRITICAL: Base your work ONLY on the ARGUMENTS_JSON. 
    - Only select or create concepts that are explicitly or implicitly referenced in the argument text.
    - For each argument, identify which Doctrine(s), Policy(ies), and/or FactPattern(s) relate to that argument, if any.
    - PREFER SELECTION FIRST: Always check the catalog for existing concepts that match, if any.
    - Only create new concepts if there is need for new concepts based on the argument text.
    - It's OK if an argument doesn't relate to any doctrine, policy, or fact pattern - in that case, use empty arrays []. Only assign concepts if there is a good match.
    - An argument can have multiple doctrines, policies, or fact patterns if relevant.
    
    Return JSON format:
    {
      "argument_map": [
        {
          "argument_temp_id": string,
          "doctrine_ids": [doctrine_id1, ...],  // IDs from catalog
          "policy_ids": [policy_id1, ...],      // IDs from catalog
          "factpattern_ids": [factpattern_id1, ...],  // IDs from catalog
          "new_doctrines": [{"properties": {...}}, ...],  // Only if no catalog match
          "new_policies": [{"properties": {...}}, ...],   // Only if no catalog match
          "new_factpatterns": [{"properties": {...}}, ...]  // Only if no catalog match
        }
      ]
    }

    Selection vs Creation Decision:
    - ALWAYS prefer selecting from catalog when a reasonable match exists.
    - ONLY create new concepts when the argument references a concept that clearly doesn't exist in the catalog.
    - If uncertain, prefer selection over creation.
    - If uncertain about whether to create a new concept, don't create new concepts.
    - For newly created nodes, include only the properties defined in the schema

    Constraints (STRICTLY ENFORCED):
    - For selected IDs: ONLY return IDs that exist in the provided catalogs.
    - For new nodes: ensure properties match the schema definitions provided.
    - Return ONLY the ID field values as they appear in the catalog entries (e.g., doctrine_id, policy_id, factpattern_id)
    - CRITICAL: When selecting from catalog, use the actual ID field value (e.g., "d12345"), NOT the name field (e.g., NOT "Rule of Reason")
    - CRITICAL: For new concepts, put them in the new_doctrines/new_policies/new_factpatterns arrays, NOT in the doctrine_ids/policy_ids/factpattern_ids arrays
    - If you cannot find an exact ID match in the catalog, either use new_doctrines/new_policies/new_factpatterns or leave the IDs array empty
    - NEVER invent IDs (UUIDs, names, etc.) - only use IDs that literally appear in the catalog
    - NEVER use general legal knowledge - base everything on the argument text and case context

    DOCTRINE INSTRUCTIONS:
    {DOCTRINE_INSTRUCTIONS}

    DOCTRINE EXAMPLES:
    {DOCTRINE_EXAMPLES_JSON}

    POLICY INSTRUCTIONS:
    {POLICY_INSTRUCTIONS}

    POLICY EXAMPLES:
    {POLICY_EXAMPLES_JSON}

    FACTPATTERN INSTRUCTIONS:
    {FACTPATTERN_INSTRUCTIONS}

    FACTPATTERN EXAMPLES:
    {FACTPATTERN_EXAMPLES_JSON}

    SCHEMA_SPEC:
    {SCHEMA_SPEC_TEXT}
  expected_output: "A JSON object { argument_map: [ { argument_temp_id: string, doctrine_ids: [...], policy_ids: [...], factpattern_ids: [...], new_doctrines: [...], new_policies: [...], new_factpatterns: [...] }, ... ] }"


phase8_relief_and_type_task:
  description: |
    Phase 8: For each Ruling, extract the Relief (remedy/outcome awarded) and select its ReliefType from the catalog.

    CRITICAL: Extract information ONLY from the provided case text. Do not use general knowledge or external information.

    CASE_TEXT:
    {CASE_TEXT}

    RULINGS_JSON:
    {RULINGS_JSON}

    Guidance:
    - For each ruling, identify the Relief (specific remedy/outcome/order granted by the court).
    - Extract Relief properties (description of what was granted/denied).
    - Determine the relief_status: "granted", "denied", or "partially granted".
    - Select the most appropriate ReliefType from the catalog that categorizes this relief.
    - Return JSON as: { "results": [ { "ruling_temp_id": string, "relief": <Relief properties>, "relief_status": "granted"|"denied"|"partially granted", "relief_type_id": string }, ... ] }.
    - If no relief was specified for a ruling, you may omit that ruling from results.

    Constraints (STRICTLY ENFORCED):
    - For relief_type_id, YOU MUST ONLY RETURN values THAT EXIST IN THE PROVIDED CATALOG
    - DO NOT create, invent, or return any other relief_type_id values
    - Return ONLY the relief_type_id field values as they appear in the catalog entries
    - Extract from case text only; do not invent relief information

    RELIEF INSTRUCTIONS:
    {RELIEF_INSTRUCTIONS}

    RELIEF EXAMPLES:
    {RELIEF_EXAMPLES_JSON}

    RELIEF SCHEMA:
    {RELIEF_SPEC_TEXT}

    RELIEFTYPE INSTRUCTIONS:
    {RELIEFTYPE_INSTRUCTIONS}

    RELIEFTYPE EXAMPLES:
    {RELIEFTYPE_EXAMPLES_JSON}

    RELIEFTYPE CATALOG (select relief_type_id from here):
    {CATALOGS_JSON}
  expected_output: "A JSON object { results: [ { ruling_temp_id: string, relief: {...}, relief_status: string, relief_type_id: string }, ... ] }"


phase9_party_task:
  description: |
    Phase 9: Identify Parties from case text and deduplicate against existing Party catalog; output roles for Case relationships.

    CRITICAL: Extract parties ONLY from the provided CASE_TEXT. Do not use general knowledge or external information. Only include parties that are explicitly mentioned in the case text with their roles as stated in the text.

    INSTRUCTIONS:
    {PARTY_INSTRUCTIONS}

    PARTY EXAMPLES:
    {PARTY_EXAMPLES_JSON}

    Inputs provided in instructions as JSON blocks:
    - CASE_TEXT: raw case text
    - CATALOGS: { "Party": [ { name, type }, ... ] }

    Steps:
    1) Extract all parties involved in the case with best-guess role and type based on the case text only.
    2) For each extracted party name, fuzzy match against the Party catalog; if match is strong, standardize to catalog name.
    3) Return JSON as {
       "parties": [ { name, type }, ... ],
        "case_roles": [ { "party_index": <index in parties array>, "role": "plaintiff|defendant|appellant|appellee|petitioner|respondent" } ]
    }

    Constraints:
    - Only standardize to catalog entries; do not invent catalog names.
    - Prefer high-precision matches; if uncertain, keep extracted name.
    - Extract ONLY parties mentioned in the case text, not from general knowledge.

    CASE_TEXT:
    {CASE_TEXT}

    CATALOGS:
    {CATALOGS_JSON}
  expected_output: "A JSON object { parties: [...], case_roles: [...] }."



